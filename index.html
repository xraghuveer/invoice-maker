<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitty Invoice Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Import Custom Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Pacifico&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700;800&display=swap');

        /* Custom Theme & Scaling */
        :root {
            --neon-pink: #ec4899;
            --neon-pink-dim: rgba(236, 72, 153, 0.4);
            --dark-bg: #09090b;
        }
        
        /* SCALES EVERYTHING DOWN BY 20% */
        html { font-size: 80%; } 
        
        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: #fee2e2; }
        .font-header { font-family: 'Pacifico', cursive; }
        .font-receipt { font-family: 'JetBrains Mono', monospace; }
        .font-note { font-family: 'Indie Flower', cursive; }

        /* Neon & Styled Elements */
        .neon-text { text-shadow: 0 0 5px var(--neon-pink), 0 0 15px var(--neon-pink); }
        .neon-border { box-shadow: 0 0 10px var(--neon-pink-dim), inset 0 0 5px rgba(236, 72, 153, 0.3); }
        .dashed-line { border-bottom: 2px dashed var(--neon-pink); margin: 12px 0; opacity: 0.5; }
        
        /* Input Overrides */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* Camera/Image Button Style */
        .camera-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.5rem;
            background-color: var(--neon-pink);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 0 8px var(--neon-pink-dim);
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.2s;
        }
        .camera-button:active { transform: scale(0.95); box-shadow: 0 0 15px var(--neon-pink); }
        .camera-button.has-image { background-color: #be185d; }

        /* Print Settings */
        @media print {
            .no-print { display: none !important; }
            body { background-color: #09090b !important; margin: 0; padding: 0; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            #receipt-container { margin: 0 auto; width: 100%; box-shadow: none; border: none; }
            .receipt-item { page-break-inside: avoid; }
        }
        @page { size: auto; margin: 0mm; }
    </style>
</head>
<body class="p-4 pb-32 md:p-8 min-h-screen selection:bg-pink-500 selection:text-white">

    <div class="max-w-xl mx-auto text-center mb-6 no-print">
        <h1 class="text-5xl text-pink-500 tracking-wider neon-text font-header mt-4 mb-2">Kitty Invoice Maker</h1>
        <p class="text-sm text-pink-300 font-receipt">Acknowledgement Receipt</p>
    </div>

    <!-- MAIN FORM -->
    <div class="max-w-xl mx-auto bg-zinc-900 border border-pink-500/30 rounded-2xl p-6 mb-8 no-print neon-border">
        
        <!-- Top Details Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div>
                <label class="block text-sm font-receipt font-semibold mb-2 text-pink-300">Choose Store</label>
                <select id="biz-name" class="w-full bg-zinc-950 border border-pink-500/50 text-pink-100 font-receipt rounded-lg p-3 outline-none focus:border-pink-500 transition-colors" onchange="updateReceipt()">
                    <option value="Elena's Fine Goods">Elena's Fine Goods</option>
                    <option value="Han Han">Han Han</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-receipt font-semibold mb-2 text-pink-300">Customer Name</label>
                <input type="text" id="customer-name" placeholder="Customer Name" class="w-full bg-zinc-950 border border-pink-500/50 text-pink-100 rounded-lg p-3 outline-none focus:border-pink-500 transition-colors" oninput="updateReceipt()">
            </div>
            <div>
                <label class="block text-sm font-receipt font-semibold mb-2 text-pink-300">Customer Contact</label>
                <input type="tel" id="customer-phone" placeholder="09XX XXX XXXX" class="w-full bg-zinc-950 border border-pink-500/50 text-pink-100 rounded-lg p-3 outline-none focus:border-pink-500 transition-colors" oninput="updateReceipt()">
            </div>
            <div>
                <label class="block text-sm font-receipt font-semibold mb-2 text-pink-300">Delivery Fee (₱)</label>
                <input type="number" id="shipping-fee" value="0" class="w-full bg-zinc-950 border border-pink-500/50 text-pink-100 rounded-lg p-3 outline-none focus:border-pink-500 transition-colors" oninput="updateReceipt()">
            </div>
        </div>

        <!-- Dynamic Products Section -->
        <div>
            <label class="block text-sm font-receipt font-semibold mb-2 text-pink-300">Products</label>
            <div id="items-container" class="space-y-3">
                
                <div class="item-row bg-zinc-950/50 p-3 rounded-lg border border-pink-500/20 grid grid-cols-[1fr,4.5rem,4.5rem,2.5rem,auto] gap-2 items-center">
                    
                    <input type="text" placeholder="Item Name" class="item-desc w-full bg-zinc-900 border border-pink-500/50 text-pink-100 rounded-lg p-2 outline-none focus:border-pink-500 transition-colors" oninput="handleDynamicRow(this); updateReceipt();">
                    
                    <input type="number" placeholder="Price" class="item-price w-full bg-zinc-900 border border-pink-500/50 text-pink-100 rounded-lg p-2 text-center outline-none focus:border-pink-500 transition-colors" oninput="updateReceipt()">

                    <input type="number" value="1" min="1" class="item-qty w-full bg-zinc-900 border border-pink-500/50 text-pink-100 rounded-lg p-2 text-center outline-none focus:border-pink-500 transition-colors" oninput="updateReceipt()">
                    
                    <label class="camera-button">
                        <span>+</span>
                        <input type="file" accept="image/*" class="item-image hidden" onchange="handleImageUpload(this); updateReceipt();">
                    </label>
                    
                    <button onclick="removeItem(this)" class="remove-btn invisible text-pink-600 hover:text-pink-400 font-bold px-2 py-1 rounded bg-zinc-900 border border-pink-600/50 text-sm transition-colors">X</button>
                </div>

            </div>
        </div>
    </div>

    <!-- RECEIPT PREVIEW -->
    <div id="receipt-container" class="max-w-md mx-auto bg-zinc-950 border-2 border-pink-500 shadow-[0_0_20px_rgba(236,72,153,0.3)] p-8 font-receipt text-base text-pink-100 relative rounded-md">
        
        <div class="text-center mb-8">
            <h1 id="display-biz-name" class="text-4xl font-bold tracking-widest text-pink-400 neon-text font-header mb-2">Elena's Fine Goods</h1>
            <p class="text-xs text-pink-300/70 mt-1 uppercase tracking-widest">Acknowledgement Receipt</p>
        </div>

        <div class="mb-6 text-pink-200 text-sm space-y-2">
            <div class="flex justify-between">
                <span>Date:</span>
                <span id="display-date" class="font-bold">-----</span>
            </div>
            <div class="flex justify-between">
                <span>Billed To:</span>
                <span id="display-name" class="font-bold text-pink-400">-----</span>
            </div>
            <div class="flex justify-between">
                <span>Contact:</span>
                <span id="display-phone" class="font-bold text-pink-400">-----</span>
            </div>
        </div>

        <div class="dashed-line"></div>

        <div class="grid grid-cols-[1fr,3rem,6rem,7rem] gap-2 font-bold mb-4 uppercase text-xs text-pink-400 text-right">
            <span class="text-left">Item Name</span>
            <span>Qty</span>
            <span>Price</span>
            <span>Total</span>
        </div>
        
        <div id="receipt-items-list" class="space-y-5 mb-4 text-sm">
            <!-- Items inject here -->
        </div>
        
        <div class="dashed-line"></div>

        <div class="flex justify-between mb-2 mt-4 text-sm">
            <span class="text-pink-100">Subtotal</span>
            <span id="display-subtotal" class="text-pink-300">₱0.00</span>
        </div>

        <div class="flex justify-between mb-2 text-sm">
            <span class="text-pink-100">Delivery Fee</span>
            <span id="display-shipping" class="text-pink-300">₱0.00</span>
        </div>

        <div class="dashed-line"></div>

        <div class="flex justify-between items-center mt-6 mb-10">
            <span class="font-bold uppercase tracking-wide text-pink-400">Total Due</span>
            <span id="display-total" class="font-bold text-2xl neon-text text-pink-500">₱0.00</span>
        </div>

        <div class="text-center mt-10">
            <p class="text-2xl text-pink-400/80 font-note">Thank you for your purchase!</p>
            <p class="text-xs text-pink-500/50 mt-3 font-receipt tracking-widest">✧ KITTY INVOICE MAKER ✧</p>
        </div>
    </div>

    <!-- ACTION BUTTONS (SHRUNK DOWN) -->
    <div class="fixed bottom-0 left-0 right-0 p-3 bg-zinc-950/90 backdrop-blur-sm border-t border-pink-500/30 no-print flex flex-col items-center gap-2 z-50">
        
        <button id="url-tip-btn" class="bg-zinc-800 text-pink-300 text-xs px-4 py-1.5 rounded-full border border-pink-500/30 font-receipt hover:bg-pink-900 transition-colors cursor-help">
            How to Remove Page Link from PDF?
        </button>

        <button onclick="window.print()" class="w-full max-w-xl bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 px-6 rounded-xl shadow-[0_0_10px_rgba(236,72,153,0.5)] active:scale-95 transition-all text-base tracking-wide uppercase font-receipt">
            ⚡ Save Digital Bill
        </button>
    </div>

    <script>
        document.getElementById('display-date').textContent = new Date().toLocaleDateString('en-PH');

        function updateReceipt() {
            document.getElementById('display-biz-name').textContent = document.getElementById('biz-name').value;
            document.getElementById('display-name').textContent = document.getElementById('customer-name').value || '-----';
            document.getElementById('display-phone').textContent = document.getElementById('customer-phone').value || '-----';
            
            const itemRows = document.querySelectorAll('.item-row');
            const receiptItemsList = document.getElementById('receipt-items-list');
            receiptItemsList.innerHTML = ''; 
            let subtotal = 0;

            itemRows.forEach((row) => {
                const desc = row.querySelector('.item-desc').value || '-----';
                const qty = parseInt(row.querySelector('.item-qty').value) || 1;
                const price = parseFloat(row.querySelector('.item-price').value) || 0;
                const imgSrc = row.dataset.imgSrc;
                const rowTotal = qty * price;

                subtotal += rowTotal;

                const fPrice = price.toLocaleString('en-PH', {minimumFractionDigits: 2});
                const fTotal = rowTotal.toLocaleString('en-PH', {minimumFractionDigits: 2});

                const itemHtml = `
                    <div class="receipt-item">
                        ${imgSrc ? `<div class="mb-3 flex justify-start"><img src="${imgSrc}" class="w-24 h-24 object-cover rounded-md border border-pink-500 shadow-[0_0_8px_rgba(236,72,153,0.4)]"></div>` : ''}
                        <div class="grid grid-cols-[1fr,3rem,6rem,7rem] gap-2 items-end text-right">
                            <span class="text-left text-pink-100 truncate">${desc}</span>
                            <span class="text-pink-100">${qty}</span>
                            <span class="text-pink-100 whitespace-nowrap">₱${fPrice}</span>
                            <span class="text-pink-300 whitespace-nowrap">₱${fTotal}</span>
                        </div>
                    </div>
                `;
                receiptItemsList.insertAdjacentHTML('beforeend', itemHtml);
            });

            const shipping = parseFloat(document.getElementById('shipping-fee').value) || 0;
            const grandTotal = subtotal + shipping;

            document.getElementById('display-subtotal').textContent = '₱' + subtotal.toLocaleString('en-PH', {minimumFractionDigits: 2});
            document.getElementById('display-shipping').textContent = '₱' + shipping.toLocaleString('en-PH', {minimumFractionDigits: 2});
            document.getElementById('display-total').textContent = '₱' + grandTotal.toLocaleString('en-PH', {minimumFractionDigits: 2});
        }

        function addNewItem() {
            const container = document.getElementById('items-container');
            const row = document.createElement('div');
            
            row.className = 'item-row bg-zinc-950/50 p-3 rounded-lg border border-pink-500/20 grid grid-cols-[1fr,4.5rem,4.5rem,2.5rem,auto] gap-2 items-center';
            row.innerHTML = `
                <input type="text" placeholder="Item Name" class="item-desc w-full bg-zinc-900 border border-pink-500/50 text-pink-100 rounded-lg p-2 outline-none focus:border-pink-500 transition-colors" oninput="handleDynamicRow(this); updateReceipt();">
                <input type="number" placeholder="Price" class="item-price w-full bg-zinc-900 border border-pink-500/50 text-pink-100 rounded-lg p-2 text-center outline-none focus:border-pink-500 transition-colors" oninput="updateReceipt()">
                <input type="number" value="1" min="1" class="item-qty w-full bg-zinc-900 border border-pink-500/50 text-pink-100 rounded-lg p-2 text-center outline-none focus:border-pink-500 transition-colors" oninput="updateReceipt()">
                <label class="camera-button">
                    <span>+</span>
                    <input type="file" accept="image/*" class="item-image hidden" onchange="handleImageUpload(this); updateReceipt();">
                </label>
                <button onclick="removeItem(this)" class="remove-btn text-pink-600 hover:text-pink-400 font-bold px-2 py-1 rounded bg-zinc-900 border border-pink-600/50 text-sm transition-colors">X</button>
            `;
            container.appendChild(row);
            updateReceipt();
        }

        function handleDynamicRow(input) {
            const row = input.closest('.item-row');
            const container = document.getElementById('items-container');
            const rows = container.querySelectorAll('.item-row');

            if (input.value.trim() !== "" && row === rows[rows.length - 1]) {
                addNewItem();
            }
        }

        function removeItem(button) {
            const container = document.getElementById('items-container');
            if(container.querySelectorAll('.item-row').length > 1) {
                button.closest('.item-row').remove();
                updateReceipt();
            }
        }

        function handleImageUpload(input) {
            const file = input.files[0];
            const label = input.closest('label');
            const row = input.closest('.item-row');
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    row.dataset.imgSrc = e.target.result;
                    label.classList.add('has-image'); 
                    label.querySelector('span').textContent = '✓'; 
                    updateReceipt();
                }
                reader.readAsDataURL(file);
            } else {
                row.dataset.imgSrc = "";
                label.classList.remove('has-image');
                label.querySelector('span').textContent = '+';
                updateReceipt();
            }
        }

        document.getElementById('url-tip-btn').addEventListener('click', function() {
            const guides = {
                'chrome': "Google Chrome: When the print window opens, click 'More settings', scroll down, and uncheck 'Headers and footers'.",
                'safari_mac': "Safari (Mac): In the print dialog, ensure 'Print headers and footers' is unchecked.",
                'safari_ios': "Safari (iOS): Tap the 'aA' icon in the address bar, choose 'Print', then tap 'Options' and turn off 'Headers & Footers'.",
                'mobile': "Mobile Browsers: Look for 'More Options' or 'Advanced' in your print preview and uncheck 'Headers/Footers' or 'Page Info'."
            };
            
            let userGuide = guides['chrome'];
            if (navigator.userAgent.includes('Safari') && !navigator.userAgent.includes('Chrome')) {
                if (navigator.userAgent.includes('Macintosh')) userGuide = guides['safari_mac'];
                else if (navigator.userAgent.includes('iPhone') || navigator.userAgent.includes('iPad')) userGuide = guides['safari_ios'];
            } else if (navigator.userAgent.includes('Android') || navigator.userAgent.includes('iPhone')) {
                userGuide = guides['mobile'];
            }

            alert(userGuide + "\n\nThis ensures a perfectly clean digital bill without website links at the top/bottom.");
        });

        updateReceipt();
    </script>
</body>
</html>
